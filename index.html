<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Detector</title>
    <style>
        /* 1. Centralização da Página */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5eff5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 2. Estilo do Card Principal */
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .title {
            color: #1f3e5a;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* 3. Botão Estilizado */
        button {
            background-color: #c5d423; /* Cor igual ao botão 'Sign Up' anterior */
            color: #1f3e5a;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            margin-bottom: 20px;
            width: 100%;
        }

        button:hover {
            background-color: #b2c11f;
            transform: scale(1.02);
        }

        /* 4. Webcam e Resultados */
        #webcam-container {
            margin: 0 auto 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 4px solid #1f3e5a;
            width: 200px;
            height: 200px;
            background-color: #eee;
        }

        #label-container div {
            background-color: #f8f9fa;
            margin-top: 8px;
            padding: 10px;
            border-radius: 5px;
            color: #1f3e5a;
            font-weight: 600;
            border-left: 5px solid #2ab2af;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">Teachable Machine Image Model</div>
        
        <button type="button" onclick="init()">Iniciar Câmera</button>

        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/eTLmoJjl9/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = ""; // Limpa texto anterior
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Limpa labels anteriores
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
